# CI: 验证构建 + Maven Central 发布
# build: push/PR 时验证构建
# publish: 打 tag 自动发布，或 workflow_dispatch 手动发布
name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      module:
        description: '发布模块（myOaid / msaOaid / both）'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - myOaid
          - msaOaid

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build myOaid
        run: ./gradlew :myOaid:assembleRelease

      - name: Build msaOaid
        run: ./gradlew :msaOaid:assembleRelease

      - name: Build app
        run: ./gradlew :app:assembleDebug

      - name: Upload myOaid AAR
        uses: actions/upload-artifact@v5
        with:
          name: myOaid-aar
          path: myOaid/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload msaOaid AAR
        uses: actions/upload-artifact@v5
        with:
          name: oaid-sdk-aar
          path: msaOaid/build/outputs/aar/*.aar
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    env:
      JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      JRELEASER_DEPLOY_MAVEN_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
      JRELEASER_GITHUB_TOKEN: dummy

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare GPG keys
        env:
          GPG_SECRET_KEY: ${{ secrets.SIGNING_SECRET_KEY }}
          GPG_PUBLIC_KEY: ${{ secrets.SIGNING_PUBLIC_KEY }}
        run: |
          if [ -z "$GPG_SECRET_KEY" ]; then
            echo "::error::SIGNING_SECRET_KEY secret is empty or not configured"
            exit 1
          fi
          if [ -z "$GPG_PUBLIC_KEY" ]; then
            echo "::error::SIGNING_PUBLIC_KEY secret is empty or not configured"
            exit 1
          fi
          echo "JRELEASER_GPG_SECRET_KEY<<EOF" >> $GITHUB_ENV
          echo "$GPG_SECRET_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "JRELEASER_GPG_PUBLIC_KEY<<EOF" >> $GITHUB_ENV
          echo "$GPG_PUBLIC_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build AAR artifacts
        run: ./gradlew :myOaid:assembleRelease :msaOaid:assembleRelease

      - name: Publish myOaid to staging
        if: github.event_name != 'workflow_dispatch' || inputs.module == 'both' || inputs.module == 'myOaid'
        run: ./gradlew :myOaid:publishReleasePublicationToStagingRepository

      - name: Publish msaOaid to staging
        if: github.event_name != 'workflow_dispatch' || inputs.module == 'both' || inputs.module == 'msaOaid'
        run: ./gradlew :msaOaid:publishReleasePublicationToStagingRepository

      - name: Deploy to Maven Central
        run: ./gradlew jreleaserDeploy

      - name: Post-publish notice
        run: |
          echo "::notice::Artifacts deployed to Maven Central via JReleaser."
