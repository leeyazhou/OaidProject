# CI: йӘҢиҜҒжһ„е»ә + Maven Central еҸ‘еёғ
# жһ„е»ә job еңЁ push/PR ж—¶йӘҢиҜҒпјӣеҸ‘еёғ job еңЁжү“ tag ж—¶и§ҰеҸ‘
name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build myOaid
        run: ./gradlew :myOaid:assembleRelease

      - name: Build msaOaid
        run: ./gradlew :msaOaid:assembleRelease

      - name: Build app (йӘҢиҜҒзӨәдҫӢеә”з”Ё)
        run: ./gradlew :app:assembleDebug

      - name: Upload myOaid AAR
        uses: actions/upload-artifact@v5
        with:
          name: myOaid-aar
          path: myOaid/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload msaOaid AAR
        uses: actions/upload-artifact@v5
        with:
          name: oaid-sdk-aar
          path: msaOaid/build/outputs/aar/*.aar
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # иҝҳеҺҹ GPG з§Ғй’ҘеҲ° local.properties еј•з”Ёзҡ„и·Ҝеҫ„
      - name: Restore GPG secret key
        env:
          GPG_SECRET_KEY: ${{ secrets.SIGNING_SECRET_KEY_BASE64 }}
        run: |
          echo "$GPG_SECRET_KEY" | base64 -d > $HOME/secring.gpg
          echo "signing.secretKeyRingFile=$HOME/secring.gpg" >> local.properties

      # еҶҷе…ҘеҮӯжҚ®еҲ° local.propertiesпјҲmaven_aar.gradle д»ҺжӯӨиҜ»еҸ–пјү
      - name: Configure credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          cat >> local.properties <<EOF
          centralPortalUsername=$CENTRAL_USERNAME
          centralPortalPassword=$CENTRAL_PASSWORD
          signing.keyId=$SIGNING_KEY_ID
          signing.password=$SIGNING_PASSWORD
          EOF

      - name: Publish myOaid to Maven Central
        run: ./gradlew :myOaid:publishReleasePublicationToCentralPortalRepository

      - name: Publish msaOaid to Maven Central
        run: ./gradlew :msaOaid:publishReleasePublicationToCentralPortalRepository

      # дёҠдј еҗҺйңҖеңЁ central.sonatype.com жүӢеҠЁзӮ№ PublishпјҢжҲ–и°ғз”Ё staging API:
      #   curl -u <token> -X POST https://ossrh-staging-api.central.sonatype.com/service/local/staging/bulk/close
      #   curl -u <token> -X POST https://ossrh-staging-api.central.sonatype.com/service/local/staging/bulk/promote
