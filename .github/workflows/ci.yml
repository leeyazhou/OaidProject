# CI: 验证构建 + Maven Central 发布
# build: push/PR 时验证构建
# publish: 打 tag 自动发布，或 workflow_dispatch 手动发布
name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      module:
        description: '发布模块（myOaid / msaOaid / both）'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - myOaid
          - msaOaid

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build myOaid
        run: ./gradlew :myOaid:assembleRelease

      - name: Build msaOaid
        run: ./gradlew :msaOaid:assembleRelease

      - name: Build app (验证示例应用)
        run: ./gradlew :app:assembleDebug

      - name: Upload myOaid AAR
        uses: actions/upload-artifact@v5
        with:
          name: myOaid-aar
          path: myOaid/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload msaOaid AAR
        uses: actions/upload-artifact@v5
        with:
          name: oaid-sdk-aar
          path: msaOaid/build/outputs/aar/*.aar
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build AAR artifacts
        run: ./gradlew :myOaid:assembleRelease :msaOaid:assembleRelease

      - name: Restore GPG secret key
        env:
          GPG_SECRET_KEY: ${{ secrets.SIGNING_SECRET_KEY_BASE64 }}
        run: |
          echo "$GPG_SECRET_KEY" | base64 -d > $HOME/secring.gpg
          echo "signing.secretKeyRingFile=$HOME/secring.gpg" >> local.properties

      - name: Configure credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          {
            echo "centralPortalUsername=$CENTRAL_USERNAME"
            echo "centralPortalPassword=$CENTRAL_PASSWORD"
            echo "signing.keyId=$SIGNING_KEY_ID"
            echo "signing.password=$SIGNING_PASSWORD"
          } >> local.properties

      - name: Publish myOaid
        if: github.event_name != 'workflow_dispatch' || inputs.module == 'both' || inputs.module == 'myOaid'
        run: ./gradlew :myOaid:publishReleasePublicationToCentralPortalRepository

      - name: Publish msaOaid
        if: github.event_name != 'workflow_dispatch' || inputs.module == 'both' || inputs.module == 'msaOaid'
        run: ./gradlew :msaOaid:publishReleasePublicationToCentralPortalRepository

      - name: Post-publish notice
        run: |
          echo "::notice::Artifacts uploaded to staging. Finalize at https://central.sonatype.com (Publish) or via staging API."
