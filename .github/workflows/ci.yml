# CI: 验证构建（push 和 PR 时触发）
# JitPack 通过 tag 自动构建发布，此 workflow 仅验证构建不破坏
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build myOaid
        run: ./gradlew :myOaid:assembleRelease

      - name: Build msaOaid
        run: ./gradlew :msaOaid:assembleRelease

      - name: Build app (验证示例应用)
        run: ./gradlew :app:assembleDebug

      - name: Upload myOaid AAR
        uses: actions/upload-artifact@v4
        with:
          name: oaid-source-aar
          path: myOaid/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload msaOaid AAR
        uses: actions/upload-artifact@v4
        with:
          name: oaid-sdk-aar
          path: msaOaid/build/outputs/aar/*.aar
          if-no-files-found: error
